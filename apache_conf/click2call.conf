# Click2Call API Configuration (for /api endpoints)
<Directory /var/www/html/api>
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all granted

    # Uncomment to restrict by IP
    #<RequireAll>
    #    Require ip 127.0.0.1
    #    Require ip YOUR_IP_HERE
    #</RequireAll>

    # Rate limiting
    <IfModule mod_ratelimit.c>
        SetOutputFilter RATE_LIMIT
        SetEnv rate-limit 400
    </IfModule>

    <IfModule mod_rewrite.c>
        RewriteEngine On
        RewriteBase /api

        # Reverse proxy all /api/v1/ requests to the FastAPI backend running on port 8000
        RewriteRule ^v1/(.*)$ http://127.0.0.1:8000/api/v1/$1 [P,L]
    </IfModule>

    # Add security headers
    Header set X-Frame-Options "DENY"
    Header set X-Content-Type-Options "nosniff"
    Header set X-XSS-Protection "1; mode=block"
    Header set Access-Control-Allow-Origin "*"
    Header set Access-Control-Allow-Methods "POST, GET, OPTIONS"
    Header set Access-Control-Allow-Headers "Content-Type"
</Directory>

# Logging
ErrorLog ${APACHE_LOG_DIR}/click2call_error.log
CustomLog ${APACHE_LOG_DIR}/click2call_access.log combined