name: Mirror main to public-repo

on:
  push:
    branches: [ main ]

permissions:
  contents: read

env:
  PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
  PUBLIC_REPO: Click2Call-for-FreePBX
  OWNER: ${{ github.repository_owner }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Push to public-repo
        run: |
          git config user.name  "mirror-bot"
          git config user.email "mirror-bot@users.noreply.github.com"

          # 1. Remove the workflows folder locally inside the runner environment
          rm -rf .github

          # 2. Commit that deletion locally so Git knows not to push it
          git add -A
          git commit -m "Strip private workflows for public repo"

          # 3. Add the remote and force-push the cleaned code
          git remote add public-repo https://x-access-token:${{env.PAT_TOKEN}}@github.com/${{env.OWNER}}/${{env.PUBLIC_REPO}}
          git push -f public-repo main
